<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="OpenAdOps is a local-first AI workspace for paid-media intake, launch packs, experiment ledgers, optimization decisions and reports." />
    <meta property="og:title" content="OpenAdOps — From client brief to defensible ad strategy" />
    <meta property="og:description" content="Local-first AI workspace for intake, launch packs, experiment ledgers, optimization and reporting." />
    <meta property="og:image" content="./og.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <title>OpenAdOps｜付费媒体工作台</title>
    <link rel="icon" href="./og.png" type="image/png" />
    <link rel="stylesheet" href="./styles.css?v=0.4.3" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand-block">
          <div class="brand-mark">OA</div>
          <div>
            <div class="brand-name">OpenAdOps</div>
            <div class="brand-subtitle">付费媒体工作台</div>
          </div>
        </div>

        <nav class="primary-nav" aria-label="主导航">
          <a href="#overview" data-route="overview"><span>00</span>项目总览</a>
          <a href="#intake" data-route="intake"><span>01</span>需求接收</a>
          <a href="#strategy" data-route="strategy"><span>02</span>投放策略</a>
          <a href="#creative" data-route="creative"><span>03</span>素材计划</a>
          <a href="#launch" data-route="launch"><span>04</span>执行方案</a>
          <a href="#experiments" data-route="experiments"><span>05</span>实验台</a>
          <a href="#optimize" data-route="optimize"><span>06</span>投放优化</a>
          <a href="#report" data-route="report"><span>07</span>报告输出</a>
        </nav>

        <div class="sidebar-note">
          <div class="status-dot"></div>
          <div>
            <strong>本地优先 · 开源</strong>
            <span>项目数据保存在当前浏览器</span>
          </div>
        </div>
      </aside>

      <section class="workspace">
        <header class="topbar">
          <div class="project-switcher">
            <label for="projectSelect">当前项目</label>
            <select id="projectSelect" aria-label="选择项目"></select>
            <span id="demoBadge" class="demo-badge" hidden>演示数据</span>
          </div>
          <div class="topbar-actions">
            <span class="app-version" id="appVersion">v0.4.3</span>
            <div class="mode-switch" role="group" aria-label="分析模式" title="本地演示不耗额度；GPT-5.6 智能路由调用本机 Codex">
              <button type="button" class="mode-switch-btn" data-ai-mode="mock" id="modeMockBtn">本地演示</button>
              <button type="button" class="mode-switch-btn" data-ai-mode="codex" id="modeCodexBtn">GPT-5.6</button>
            </div>
            <select id="aiMode" hidden aria-hidden="true">
              <option value="mock">本地演示</option>
              <option value="codex">GPT-5.6</option>
            </select>
            <div class="backup-actions" title="项目保存在本机浏览器；请定期导出备份">
              <button class="button button-ghost button-small" id="exportProjectButton" type="button">导出当前</button>
              <button class="button button-ghost button-small" id="exportWorkspaceButton" type="button">导出全部</button>
              <button class="button button-secondary button-small" id="importWorkspaceButton" type="button">导入备份</button>
              <input id="importWorkspaceFile" type="file" accept="application/json,.json" hidden />
            </div>
            <button class="button button-secondary" id="newProjectButton" type="button">＋ 新建项目</button>
          </div>
        </header>

        <section id="aiJobPanel" class="ai-job-panel" hidden aria-live="polite">
          <div class="ai-job-pulse" aria-hidden="true"></div>
          <div class="ai-job-copy">
            <strong id="aiJobLabel">正在生成</strong>
            <span id="aiJobMeta">正在准备模型路由…</span>
          </div>
          <div class="ai-job-time">
            <strong id="aiJobElapsed">00:00</strong>
            <span id="aiJobExpected">预计耗时计算中</span>
          </div>
          <button id="aiCancelButton" class="button button-ghost button-small" type="button">取消生成</button>
        </section>

        <section id="aiErrorPanel" class="ai-error-panel" hidden role="alert">
          <div>
            <strong>本次没有写入结果</strong>
            <span id="aiErrorMessage"></span>
          </div>
          <button id="aiErrorDismiss" class="icon-button" type="button" aria-label="关闭错误提示">×</button>
        </section>

        <main id="app" class="page" aria-live="polite"></main>
      </section>
    </div>

    <dialog id="projectDialog" class="dialog">
      <form method="dialog" id="projectForm">
        <div class="dialog-header">
          <div>
            <p class="eyebrow">新建项目</p>
            <h2>建立投放项目</h2>
          </div>
          <button type="button" class="icon-button" data-close-dialog aria-label="关闭">×</button>
        </div>
        <div class="form-grid two-columns">
          <label class="field field-wide">
            <span>项目名称</span>
            <input name="name" required placeholder="例如：工具 App · 东南亚 Q3" />
          </label>
          <label class="field">
            <span>产品行业</span>
            <select name="industry">
              <option value="工具">工具 App</option>
              <option value="金融">金融 App</option>
              <option value="游戏">游戏 App</option>
            </select>
          </label>
          <label class="field">
            <span>主要目标</span>
            <select name="goal">
              <option value="Install">安装</option>
              <option value="Registration">注册</option>
              <option value="Purchase">付费 / ROAS</option>
            </select>
          </label>
          <fieldset class="field field-wide platform-field">
            <legend>投放媒体</legend>
            <label><input type="checkbox" name="platforms" value="Google Ads" checked /> Google Ads</label>
            <label><input type="checkbox" name="platforms" value="Meta Ads" checked /> Meta Ads</label>
            <label><input type="checkbox" name="platforms" value="TikTok Ads" checked /> TikTok Ads</label>
          </fieldset>
          <label class="field field-wide">
            <span>目标市场</span>
            <input name="markets" placeholder="JP, US, GB" />
          </label>
          <label class="field">
            <span>月预算</span>
            <input name="budget" type="number" min="0" placeholder="50000" />
          </label>
          <label class="field">
            <span>币种</span>
            <select name="currency">
              <option value="USD">USD</option>
              <option value="CNY">CNY</option>
              <option value="JPY">JPY</option>
              <option value="EUR">EUR</option>
              <option value="GBP">GBP</option>
            </select>
          </label>
        </div>
        <div class="dialog-actions">
          <button type="button" class="button button-ghost" data-close-dialog>取消</button>
          <button type="submit" class="button button-primary">创建并进入</button>
        </div>
      </form>
    </dialog>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>
    <script type="module" src="./app.js?v=0.4.3"></script>
  </body>
</html>
